<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de orçamentos automotivos para a Oficina O Paulista - criar, gerenciar e emitir orçamentos.">
    <title>O Paulista Orçamentos</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

    <div class="container">

        <aside class="sidebar" aria-label="Menu lateral">

            <div class="logo">
                <h2>O Paulista</h2>
                <span>Orçamentos</span>
            </div>

            <nav role="navigation" aria-label="Menu principal">
                <button id="btnDashboard" type="button">Dashboard</button>
                <button id="btnNovo" type="button">Novo Orçamento</button>
                <button id="btnAndamento" type="button">Em Andamento</button>
                <button id="btnFinalizados" type="button">Finalizados</button>    
            </nav>

        </aside>

        <main id="main-content" class="content dashboard-container" role="main">

            <header class="page-header">
                <h1>Dashboard</h1>
                <p>Gerencie os orçamentos da oficina.</p>
            </header>

            <section class="dashboard-cards" aria-label="Resumo dos orçamentos">

                <div class="dashboard-card card">
                    <h3>Total</h3>
                    <span class="metric total-count" aria-live="polite">0</span>
                </div>

                <div class="dashboard-card card">
                    <h3>Em Andamento</h3>
                    <span class="metric andamento-count" aria-live="polite">0</span>
                </div>

                <div class="dashboard-card card">
                    <h3>Finalizados</h3>
                    <span class="metric finalizados-count" aria-live="polite">0</span>
                </div>

                <div class="dashboard-card card value-card">
                    <h3>Valor Total</h3>
                    <span class="metric valor-total">R$ 0,00</span>
                </div>

            </section>

            <section class="welcome">

                <h2>Bem-vindo</h2>

                <p>
                    Utilize o menu lateral para criar, acompanhar
                    e finalizar orçamentos.
                </p>

            </section>

            <section class="form-section" aria-hidden="true"></section>

            <section class="detalhes-section" aria-hidden="true"></section>

            <section class="itens-section" aria-hidden="true"></section>

            <div id="global-actions" class="actions-container" aria-hidden="true"></div>

        </main>

    </div>

    <div id="feedback" class="feedback-container" aria-live="polite" aria-atomic="true"></div>

    <div id="modalContainer" aria-hidden="true"></div>
    <div id="confirmModal" aria-hidden="true"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
    <script src="js/orcamentos.js"></script>
</body>
</html>
