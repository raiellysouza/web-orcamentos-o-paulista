<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Paulista Orçamentos</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <aside class="sidebar">

            <div class="logo">
                <h2>O Paulista</h2>
                <span>Orçamentos</span>
            </div>

            <nav>
                <button id="btnDashboard">Dashboard</button>
                <button id="btnNovo">Novo Orçamento</button>
                <button id="btnAndamento">Em Andamento</button>
                <button id="btnFinalizados">Finalizados</button>    
            </nav>

        </aside>

        <main class="content">

            <header>
                <h1>Dashboard</h1>
                <p>Gerencie os orçamentos da oficina.</p>
            </header>

            <section class="cards">

                <div class="card">
                    <h3>Total</h3>
                    <span>0</span>
                </div>

                <div class="card">
                    <h3>Em Andamento</h3>
                    <span>0</span>
                </div>

                <div class="card">
                    <h3>Finalizados</h3>
                    <span>0</span>
                </div>

            </section>

            <section class="welcome">

                <h2>Bem-vindo</h2>

                <p>
                    Utilize o menu lateral para criar, acompanhar
                    e finalizar orçamentos.
                </p>

            </section>

        </main>

    </div>

    <script src="js/app.js"></script>
    <script src="js/orcamentos.js"></script>
</body>
</html>
